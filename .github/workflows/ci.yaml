name: TP4

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
      
  
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: recuperer le code
        uses: actions/checkout
      - name: setup python
        uses: actions/setup-python
        with:
          python-version: "3.11"
      - name: installer dependances
        run: pip install -r requirements.txt
      - name: Linter le code
        run: |
             flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
             flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
             flake8 tests --count --max-line-length=127 --statistics
      - name: lancer les tests
        run: pytest -v --cov=app