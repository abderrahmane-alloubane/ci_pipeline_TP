name: TP4

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
      
  
jobs:
  Lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: recuperer le code
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: installer dependances
        run: pip install -r requirements.txt
      - name: Linter le code
        run: |
             flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
             flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
             flake8 tests --count --max-line-length=127 --statistics
  Test:
    name: Test
    runs-on: ubuntu-latest
    needs: Lint
    steps:
        - name: installer dependances
          run: pip install -r requirements.txt
        - name: tests
          run: PYTHONPATH=. pytest -v --cov=src
  Build:
    name: Build
    runs-on: ubuntu-latest
    needs: Test
    steps:
      - name: Generer le package python
        run: python -m build
      - name: Upload du resultat comme artefact
        uses: actionS/upload-artifact@v3